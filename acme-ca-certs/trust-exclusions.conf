# ═══════════════════════════════════════════════════════════════════════════════
# ClearPass Trust List Exclusion Configuration
# File: trust-exclusions.conf
# ═══════════════════════════════════════════════════════════════════════════════
#
# PURPOSE
# ───────
# This file controls which ACME CA and intermediate CA certificates are excluded
# from the ClearPass trust list verification and upload process as a global
# fallback. Per-server exclusions can be configured in the web UI under
# Servers → Edit Server → Trust Exclusions (stored in servers.json).
#
# By default, clearpass_upload.py ensures that every CA and intermediate CA
# certificate — both bundled in the image and discovered in the actual
# certificate chain files — is present in the ClearPass trust list
# (Administration → Certificates → Trust List) with EAP and Others enabled.
# This guarantees the full certificate chain is trusted for HTTPS, RADIUS/EAP,
# and all other ClearPass services.
#
# Use this file to exclude specific certificates from that process, for example:
#   • A certificate already managed by a different process or imported manually
#     and you do not want this tool to modify or re-upload it.
#   • A root or intermediate not needed by your CPPM deployment (e.g. if RADIUS
#     is handled by a separate PKI that does not use ECDSA intermediates).
#   • Troubleshooting: suppress a specific upload without disabling all checks.
#
# PRIORITY
# ────────
# Per-server exclusions (configured in the web UI and stored in servers.json)
# take precedence over this file. This file is only read when a server has no
# per-server exclusions configured.
#
# WHEN THIS FILE IS READ
# ──────────────────────
# Both of the following operations read this file before touching the trust list:
#
#   1. Post-renewal upload (deploy_hook.sh → clearpass_upload.py)
#      Runs automatically after every certificate issuance or renewal.
#
#   2. Periodic trust check (trust_check.sh, scheduled weekly via supercronic)
#      Independently verifies and repairs the trust list without renewing certs.
#      Schedule: every Sunday at 03:00 container-local time.
#
# Excluded certificates are silently skipped — they are never uploaded, never
# patched, and no error or warning is raised if they are absent from the list.
#
# RUNTIME LOCATION
# ────────────────
# The container reads the FIRST file that exists, in this order:
#
#   1. /opt/cppm-certs/trust-exclusions.conf   (host path — persistent, editable)
#      /data/certs/trust-exclusions.conf        (same file, container path)
#
#   2. /opt/cppm/acme-ca-certs/trust-exclusions.conf (image default — this file)
#
# On first container start, entrypoint.sh copies this default to the volume
# so you have a persistent editable copy at /opt/cppm-certs/trust-exclusions.conf
# without needing to rebuild the image. Edit that host-side copy to make changes
# that survive container restarts and rebuilds.
#
# FORMAT
# ──────
# • One certificate entry per line.
# • Each entry is matched case-insensitively against the certificate's Subject
#   Common Name (CN). Partial matches are supported:
#     "R11"         matches  CN=R11, O=Let's Encrypt, C=US
#     "ISRG Root"   matches  CN=ISRG Root X1  and  CN=ISRG Root X2
# • Lines starting with # are comments and are ignored.
# • Blank lines are ignored.
# • Fingerprint-based exclusion is not supported; use CN matching only.
#
# EXAMPLES
# ────────
# Exclude R11 (e.g. already imported manually and managed separately):
#   R11
#
# Exclude the ISRG Root X2 ECDSA root (if your CPPM does not use ECDSA EAP):
#   ISRG Root X2
#
# Exclude all 2024-batch ECDSA intermediates:
#   E5
#   E6
#
# ═══════════════════════════════════════════════════════════════════════════════
# EXCLUSIONS — uncomment or add entries below to activate
# ═══════════════════════════════════════════════════════════════════════════════
#
# By default no certificates are excluded. All CA and intermediate CA
# certificates will be verified and uploaded to the ClearPass trust list.

# ── Let's Encrypt — Root CAs ──────────────────────────────────────────────────
