# ── Traefik HTTPS overlay ─────────────────────────────────────────────────────
# Adds Traefik as a reverse proxy providing automatic HTTPS for the web UI.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# Required — set in a .env file or export before running:
#   TRAEFIK_HOST   hostname the cert manager UI is served on  e.g. cert-mgr.example.com
#   TRAEFIK_EMAIL  contact address for Let's Encrypt notifications
#
# ── Challenge method ──────────────────────────────────────────────────────────
# The default configuration uses the HTTP-01 challenge, which requires:
#   • Port 80 accessible from the internet (Let's Encrypt must be able to
#     reach http://<TRAEFIK_HOST>/.well-known/acme-challenge/)
#   • A public DNS record for TRAEFIK_HOST pointing to this host
#
# For internal / air-gapped deployments use DNS-01 instead — see the
# "DNS-01 challenge" section at the bottom of this file.
#
# ── Before first run ──────────────────────────────────────────────────────────
#   sudo mkdir -p /opt/traefik-acme
#   sudo chmod 700 /opt/traefik-acme
# ─────────────────────────────────────────────────────────────────────────────

networks:
  traefik_net:
    driver: bridge

services:

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    command:
      # ── Security ─────────────────────────────────────────────────────────────
      # Disable the insecure dashboard endpoint. Enable it only for debugging by
      # changing to: --api.insecure=true  and adding port "8081:8080" below.
      - "--api.insecure=false"

      # ── Docker provider ───────────────────────────────────────────────────────
      # Only route to containers that explicitly opt in with traefik.enable=true.
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik_net"

      # ── Entrypoints ───────────────────────────────────────────────────────────
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"

      # ── Let's Encrypt — HTTP-01 challenge (default) ───────────────────────────
      # Swap these four lines for the DNS-01 block below if this host is internal.
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme

    networks:
      - traefik_net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Attach the cert manager to the Traefik network and add routing labels ───
  cppm-acme-cert-manager:
    networks:
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cppm-ui.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.cppm-ui.entrypoints=websecure"
      - "traefik.http.routers.cppm-ui.tls=true"
      - "traefik.http.routers.cppm-ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.cppm-ui.loadbalancer.server.port=8080"

volumes:
  traefik_acme:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/traefik-acme

# ── DNS-01 challenge (internal / air-gapped deployments) ─────────────────────
#
# Replace the four HTTP-01 command lines in the traefik service with:
#
#   - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_EMAIL}"
#   - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
#   - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
#   - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=<provider>"
#
# Then add the matching credentials as environment variables on the traefik
# service. Traefik uses the same Lego DNS providers as this project, so the
# variable names are identical to what you already configured per-server.
#
# Cloudflare:
#   environment:
#     CF_DNS_API_TOKEN: ${CF_Token}
#
# Porkbun:
#   environment:
#     PORKBUN_API_KEY: ${PORKBUN_API_KEY}
#     PORKBUN_SECRET_API_KEY: ${PORKBUN_SECRET_API_KEY}
#
# Route 53 / AWS:
#   environment:
#     AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
#     AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
#     AWS_REGION: ${AWS_DEFAULT_REGION}
#
# Full provider list: https://doc.traefik.io/traefik/https/acme/#providers
# (provider names and env vars match Lego — https://go-acme.github.io/lego/dns/)
# ─────────────────────────────────────────────────────────────────────────────
