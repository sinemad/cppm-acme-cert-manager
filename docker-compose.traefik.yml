# ── Traefik HTTPS overlay ─────────────────────────────────────────────────────
# Adds Traefik as a reverse proxy with automatic HTTPS for the web UI.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# Before first run:
#   sudo mkdir -p /opt/traefik-acme
#   sudo chmod 700 /opt/traefik-acme
#   sudo mkdir -p /opt/cppm-certs/traefik/dynamic   # created by UI on first save; needed for manual setup
#
# ── Option A: configure via the web UI (recommended) ──────────────────────────
#   1. Start the stack: docker compose up -d   (HTTP only, no Traefik yet)
#   2. Open http://<host>:8080/ → complete the setup wizard → step 1 generates
#      this file populated with your hostname, email, and challenge settings.
#   3. Replace this file with the generated content, then run:
#        docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# ── Option B: configure manually ──────────────────────────────────────────────
# Set TRAEFIK_EMAIL below (or export it) and fill in the challenge section.
# The hostname and routing are written by the web UI to:
#   /opt/cppm-certs/traefik/dynamic/cppm.yml
# That file must exist before Traefik starts (the UI creates it on save).
#
# ── Challenge method ──────────────────────────────────────────────────────────
# Default: HTTP-01 — requires port 80 accessible from the internet.
# For private/internal networks, see the DNS-01 section at the bottom.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  traefik_net:
    driver: bridge

services:

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    command:
      # ── Security ────────────────────────────────────────────────────────────
      - "--api.insecure=false"

      # ── File provider — reads routing from the shared data volume ────────────
      # The web UI writes /opt/cppm-certs/traefik/dynamic/cppm.yml.
      # Traefik hot-reloads it when the hostname changes — no restart needed.
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"

      # ── Entrypoints ─────────────────────────────────────────────────────────
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"

      # ── Let's Encrypt — HTTP-01 challenge (default) ──────────────────────────
      # Replace with the DNS-01 block below for private networks.
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - traefik_acme:/acme
      # Dynamic routing config written by the web UI — mounted read-only into Traefik.
      # Uses CPPM_DATA_PATH (default: /opt/cppm-certs) so it matches the data volume.
      - ${CPPM_DATA_PATH:-/opt/cppm-certs}/traefik/dynamic:/etc/traefik/dynamic:ro

    networks:
      - traefik_net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Attach the cert manager to the Traefik network ──────────────────────────
  # No labels needed — routing is handled by the file provider above.
  cppm-acme-cert-manager:
    networks:
      - traefik_net

volumes:
  traefik_acme:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/traefik-acme

# ── DNS-01 challenge (internal / air-gapped deployments) ─────────────────────
#
# Replace the two HTTP-01 command lines above with:
#
#   - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_EMAIL}"
#   - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
#   - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
#   - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=<provider>"
#
# Then add the provider credentials as environment variables. Traefik uses the
# same Lego DNS providers — variable names match what you configured in the
# web UI. The web UI generates this block automatically when DNS-01 is selected.
#
# Cloudflare:
#   environment:
#     CF_DNS_API_TOKEN: ${CF_Token}
#
# Porkbun:
#   environment:
#     PORKBUN_API_KEY: ${PORKBUN_API_KEY}
#     PORKBUN_SECRET_API_KEY: ${PORKBUN_SECRET_API_KEY}
#
# Route 53 / AWS:
#   environment:
#     AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
#     AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
#     AWS_REGION: ${AWS_DEFAULT_REGION}
#
# Full provider list: https://doc.traefik.io/traefik/https/acme/#providers
# ─────────────────────────────────────────────────────────────────────────────
