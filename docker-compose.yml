version: "3.9"

services:
  cppm-acme-cert-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: cppm-acme-cert-manager:latest
    container_name: cppm-acme-cert-manager
    restart: unless-stopped

    environment:
      # ── Container ────────────────────────────────────────────────────────────
      TZ: ${TZ:-UTC}

      # ── Web UI ───────────────────────────────────────────────────────────────
      # Port must match the host-side port mapping below.
      STATUS_PORT:             ${STATUS_PORT:-8080}
      REQUIRE_AUTH_FOR_STATUS: ${REQUIRE_AUTH_FOR_STATUS:-false}
      SESSION_LIFETIME_HOURS:  ${SESSION_LIFETIME_HOURS:-8}

      # ── Certificate upload callback ──────────────────────────────────────────
      # Port must match the host-side port mapping below.
      # CPPM fetches the PKCS12 via http://<callback_host>:<port>/ during upload.
      # The callback HOST is set per-server in the web UI (Servers page).
      CPPM_CALLBACK_PORT: ${CPPM_CALLBACK_PORT:-8765}

      # ── Operational flags ────────────────────────────────────────────────────
      FORCE_RENEW:  ${FORCE_RENEW:-false}
      SKIP_UPLOAD:  ${SKIP_UPLOAD:-false}
      LOG_LEVEL:    ${LOG_LEVEL:-INFO}

      # ── Legacy migration vars ────────────────────────────────────────────────
      # These are only used once, on first startup, to auto-migrate an existing
      # .env-based configuration into servers.json. After migration they are
      # ignored. New installations configure servers through the web UI instead.
      #
      # All default to empty string — no effect if not set in .env.
      DOMAIN:               ${DOMAIN:-}
      ACME_EMAIL:           ${ACME_EMAIL:-}
      ACME_SERVER:          ${ACME_SERVER:-letsencrypt}
      DNS_PROVIDER:         ${DNS_PROVIDER:-cloudflare}
      CF_Token:             ${CF_Token:-}
      CF_Account_ID:        ${CF_Account_ID:-}
      CF_Zone_ID:           ${CF_Zone_ID:-}
      CF_Key:               ${CF_Key:-}
      CF_Email:             ${CF_Email:-}
      PORKBUN_API_KEY:        ${PORKBUN_API_KEY:-}
      PORKBUN_SECRET_API_KEY: ${PORKBUN_SECRET_API_KEY:-}
      AWS_ACCESS_KEY_ID:      ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY:  ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION:     ${AWS_DEFAULT_REGION:-us-east-1}
      DO_API_KEY:             ${DO_API_KEY:-}
      GD_Key:                 ${GD_Key:-}
      GD_Secret:              ${GD_Secret:-}
      CPPM_HOST:            ${CPPM_HOST:-}
      CPPM_CLIENT_ID:       ${CPPM_CLIENT_ID:-}
      CPPM_CLIENT_SECRET:   ${CPPM_CLIENT_SECRET:-}
      CPPM_VERIFY_SSL:      ${CPPM_VERIFY_SSL:-false}
      CPPM_CERT_PASSPHRASE: ${CPPM_CERT_PASSPHRASE:-}
      CPPM_CALLBACK_HOST:   ${CPPM_CALLBACK_HOST:-}

    volumes:
      # Single persistent volume – certificates, config, and logs.
      - cppm_certs:/data/certs

    ports:
      # Temporary HTTP server for PKCS12 delivery during cert upload.
      - "${CPPM_CALLBACK_PORT:-8765}:${CPPM_CALLBACK_PORT:-8765}"
      # Web UI. Browse to http://<docker-host>:STATUS_PORT/
      - "${STATUS_PORT:-8080}:${STATUS_PORT:-8080}"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cppm_certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      # Host directory for persistent storage.
      # Create before first run: sudo mkdir -p /opt/cppm-certs
      device: /opt/cppm-certs
